# Push a v* tag and GitHub builds, signs, and publishes the release,
# including the latest.json manifest the in-app updater polls.
# Requires repo secrets: TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    # macos-latest runners are arm64; we ship Apple Silicon only.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "InstantNotes ${{ github.ref_name }}"
          releaseDraft: true
          includeUpdaterJson: true
          releaseBody: |
            Apple Silicon only. The build is ad-hoc signed, not notarized.

            First launch: right-click InstantNotes.app, choose Open, then Open again.
            Fallback: `xattr -d com.apple.quarantine /Applications/InstantNotes.app`

            Existing installs update themselves from inside the app.
