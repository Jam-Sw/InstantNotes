<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="InstantNotes app icon">
  <title>InstantNotes</title>
  <defs>
    <clipPath id="instantnotes-squircle">
      <rect x="16" y="16" width="480" height="480" rx="96"></rect>
    </clipPath>
    <linearGradient id="instantnotes-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f14"></stop>
      <stop offset="100%" stop-color="#1a1a24"></stop>
    </linearGradient>
    <linearGradient id="in-top-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"></stop>
      <stop offset="100%" stop-color="#6366f1"></stop>
    </linearGradient>
    <linearGradient id="in-top-r" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"></stop>
      <stop offset="100%" stop-color="#4f46e5"></stop>
    </linearGradient>
    <linearGradient id="in-mid-l" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4f46e5"></stop>
      <stop offset="100%" stop-color="#312e81"></stop>
    </linearGradient>
    <linearGradient id="in-mid-r" x1="1" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3730a3"></stop>
      <stop offset="100%" stop-color="#1e1b4b"></stop>
    </linearGradient>
    <linearGradient id="in-bot" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#312e81"></stop>
      <stop offset="100%" stop-color="#1e1b4b"></stop>
    </linearGradient>
  </defs>

  
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#instantnotes-bg)"></rect>

  <g clip-path="url(#instantnotes-squircle)">
    
    <ellipse cx="256" cy="280" rx="140" ry="100" fill="#6366f1" opacity="0.06"></ellipse>

    
    <polygon points="256,100 132,220 256,260" fill="url(#in-top-l)"></polygon>
    <polygon points="256,100 380,220 256,260" fill="url(#in-top-r)"></polygon>
    <polygon points="132,220 172,400 256,260" fill="url(#in-mid-l)"></polygon>
    <polygon points="380,220 340,400 256,260" fill="url(#in-mid-r)"></polygon>
    <polygon points="172,400 340,400 256,260" fill="url(#in-bot)"></polygon>

    
    <line x1="256" y1="100" x2="132" y2="220" stroke="#c7d2fe" stroke-width="1.5" opacity="0.3"></line>
    <line x1="256" y1="100" x2="380" y2="220" stroke="#c7d2fe" stroke-width="1.5" opacity="0.2"></line>
    <line x1="132" y1="220" x2="380" y2="220" stroke="#818cf8" stroke-width="1" opacity="0.15"></line>
    <line x1="256" y1="260" x2="132" y2="220" stroke="#818cf8" stroke-width="1" opacity="0.12"></line>
    <line x1="256" y1="260" x2="380" y2="220" stroke="#818cf8" stroke-width="1" opacity="0.12"></line>

    
    <polygon points="256,120 210,190 256,220 302,190" fill="#ffffff" opacity="0.08"></polygon>
    <polygon points="240,150 220,180 245,200" fill="#ffffff" opacity="0.06"></polygon>
  </g>
</svg>